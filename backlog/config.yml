project_name: "Engui Studio"
default_status: "Inbox"
statuses: ["Inbox", "Planned", "In Progress", "Blocked", "Done"]
labels: ["gallery", "jobs", "backend", "frontend", "api", "mobile", "infra", "spec"]
date_format: yyyy-mm-dd
max_column_width: 24
auto_open_browser: false
default_port: 6420
remote_operations: true
auto_commit: false
bypass_git_hooks: false
check_active_branches: true
active_branch_days: 30
task_prefix: "engui"
